<main class="login-page">
  <form class="login-form" (ngSubmit)="login()">
    <div class="login-toolbar" aria-label="Beallitasok">
      <div class="btn-group btn-group-sm" role="group" [attr.aria-label]="t.language">
        <button type="button" class="btn btn-outline-secondary" [class.active]="ui.language() === 'hu'" (click)="setLanguage('hu')">
          HU
        </button>
        <button type="button" class="btn btn-outline-secondary" [class.active]="ui.language() === 'en'" (click)="setLanguage('en')">
          EN
        </button>
      </div>

      <div class="btn-group btn-group-sm" role="group" [attr.aria-label]="t.theme">
        <button type="button" class="btn btn-outline-secondary" [class.active]="ui.theme() === 'light'" (click)="setTheme('light')">
          {{ t.white }}
        </button>
        <button type="button" class="btn btn-outline-secondary" [class.active]="ui.theme() === 'dark'" (click)="setTheme('dark')">
          {{ t.black }}
        </button>
      </div>
    </div>

    <div class="brand-media">
      <img
        class="brand-logo"
        src="resources/Manage-me.jpeg"
        alt="manage.me"
        (error)="$any($event.target).style.display = 'none'"
      >
    </div>

    <div class="container">
      <h1>{{ t.title }}</h1>
      <p class="login-subtitle">{{ t.subtitle }}</p>

      <label for="email" class="form-label"><b>{{ t.email }}</b></label>
      <input id="email" class="form-control" type="email" [placeholder]="t.email" name="email" [(ngModel)]="email" required>

      <label for="password" class="form-label"><b>{{ t.password }}</b></label>
      <input id="password" class="form-control" [type]="showPassword ? 'text' : 'password'" [placeholder]="t.password" name="password" [(ngModel)]="password" required>

      <label class="login-checkbox">
        <input type="checkbox" name="showPassword" [(ngModel)]="showPassword">
        {{ t.showPassword }}
      </label>

      @if (error()) {
        <div class="mini-alert error" role="alert">{{ error() }}</div>
      }
      @if (message()) {
        <div class="mini-alert success" role="status">{{ message() }}</div>
      }

      <button type="submit" class="btn btn-primary btn-sm login-button" [disabled]="loading()">
        {{ loading() ? t.loading : t.login }}
      </button>

      <label class="remember">
        <input type="checkbox" name="remember" [(ngModel)]="remember">
        {{ t.remember }}
      </label>
    </div>

    <div class="container form-footer">
      <div class="login-actions">
        <button type="button" class="btn btn-outline-secondary btn-sm" routerLink="/forgot-password">
          {{ t.forgot }}
        </button>
        <button type="button" class="btn btn-outline-success btn-sm" routerLink="/register">
          {{ t.register }}
        </button>
      </div>
    </div>
  </form>
</main>
