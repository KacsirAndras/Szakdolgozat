<main class="reset-page">
  <form class="reset-form" (ngSubmit)="step() === 'email' ? requestToken() : resetPassword()">
    <div class="settings-toolbar" aria-label="Settings">
      <div class="btn-group btn-group-sm" role="group" [attr.aria-label]="t.language">
        <button type="button" class="btn btn-outline-secondary" [class.active]="ui.language() === 'hu'" (click)="setLanguage('hu')">HU</button>
        <button type="button" class="btn btn-outline-secondary" [class.active]="ui.language() === 'en'" (click)="setLanguage('en')">EN</button>
      </div>

      <div class="btn-group btn-group-sm" role="group" [attr.aria-label]="t.theme">
        <button type="button" class="btn btn-outline-secondary" [class.active]="ui.theme() === 'light'" (click)="setTheme('light')">Light</button>
        <button type="button" class="btn btn-outline-secondary" [class.active]="ui.theme() === 'dark'" (click)="setTheme('dark')">Dark</button>
      </div>
    </div>

    <div class="reset-header">
      <h1>{{ t.title }}</h1>
    </div>

    @if (step() === 'email') {
      <div class="container">
        <label for="email" class="form-label"><b>{{ t.email }}</b></label>
        <input id="email" class="form-control" type="email" name="email" [placeholder]="t.emailPlaceholder" [(ngModel)]="email" required>

        <button type="submit" class="btn btn-primary btn-sm" [disabled]="loading()">
          {{ loading() ? t.sending : t.sendToken }}
        </button>
      </div>
    }

    @if (step() === 'reset') {
      <div class="container">
        <label for="token" class="form-label"><b>{{ t.token }}</b></label>
        <input id="token" class="form-control code-input" type="text" name="token" [placeholder]="t.tokenPlaceholder" [(ngModel)]="token" required>

        <label for="newPassword" class="form-label"><b>{{ t.password }}</b></label>
        <input id="newPassword" class="form-control" type="password" name="newPassword" [(ngModel)]="newPassword" required>

        <label for="newPasswordAgain" class="form-label"><b>{{ t.passwordAgain }}</b></label>
        <input id="newPasswordAgain" class="form-control" type="password" name="newPasswordAgain" [(ngModel)]="newPasswordAgain" required>

        <button type="submit" class="btn btn-success btn-sm" [disabled]="loading()">
          {{ loading() ? t.saving : t.save }}
        </button>
      </div>
    }

    @if (message()) {
      <div class="alert alert-success mx-3 py-2">{{ message() }}</div>
    }

    @if (error()) {
      <div class="alert alert-danger mx-3 py-2">{{ error() }}</div>
    }

    <div class="container reset-footer">
      <a class="btn btn-outline-secondary btn-sm" routerLink="/login">{{ t.back }}</a>
    </div>
  </form>
</main>
